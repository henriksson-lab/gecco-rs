# Mapping file for code-complexity-comparator (ccc-rs).
#
# Pairs Rust functions in src/ with their Python originals in GECCO/gecco/.
# Use with:
#   ccc-rs compare     rust.json python.json --mapping ccc_mapping.toml
#   ccc-rs compare-tui --other-root GECCO/gecco
#
# Matching semantics (from ccc-rs docs):
#   - `rust_path` / `other_path` are path *suffixes* matched on whole components
#   - `rust_class` / `other_class` pin the enclosing class (Rust impl-target,
#     Python class). Use these whenever the bare name repeats within a file.
#   - `rust_line` / `other_line` are a last-resort line-number fallback.
#   - Entries override the default name / normalization / fingerprint matching.
#
# Omissions are deliberate: decorators, argparse configurators, dunder methods
# that Rust gets from derives, classmethods that Rust splits into builder
# chains, Python-specific adapters for biopython / polars, and test fixtures
# have no 1:1 Rust counterpart. ccc-rs has no negative/exclusion entries; if
# `order-annotate` is run without filtering to `match_strategy == Mapping`, a
# few residual Fingerprint/Normalized matches are expected false positives.

# =============================================================================
# model.py  <->  src/model.rs
# =============================================================================

# --- ClusterType -------------------------------------------------------------
[[entries]]
rust = "new"
rust_path = "src/model.rs"
rust_class = "ClusterType"
other = "__init__"
other_path = "gecco/model.py"
other_class = "ClusterType"

# Python __str__ is rendered by Rust's Display::fmt. Python __repr__ has no
# explicit Rust counterpart beyond the derived Debug implementation.
[[entries]]
rust = "fmt"
rust_path = "src/model.rs"
rust_class = "ClusterType"
other = "__str__"
other_path = "gecco/model.py"
other_class = "ClusterType"

