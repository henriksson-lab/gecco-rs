# orf.py  <->  src/orf.rs
# =============================================================================

# Python ORFFinder is the abstract base class; Rust models it as a trait, so
# its `find_genes` sits outside any impl block (enclosing_type == None on the
# Rust side). Pin explicitly so the trait signature isn't auto-paired with an
# unrelated concrete method downstream.
[[entries]]
rust = "find_genes"
rust_path = "src/orf.rs"
rust_class = ""            # empty = must have no enclosing type (free / trait decl)
other = "find_genes"
other_path = "gecco/orf.py"
other_class = "ORFFinder"

